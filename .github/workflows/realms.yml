# Every realm still builds what is committed for it.
#
# A realm is authored as a DESIGN and shipped as three artefacts — the .tscn,
# the baked .json and the .navmesh. Nothing keeps them honest except somebody
# remembering to run `dotnet run tools/GenerateRealm.cs <realm>`, and that is a
# poor guard, because a realm can go stale from a change it never mentions.
#
# It happened: setting the kit atlases to VRAM-compressed rewrote their .import
# sidecars, which changed the resource paths the Crag's scenery resolves to, so
# Crag.tscn no longer matched its own design. The work that broke it was all in
# the Crypt, and there was no reason to think about the Crag at all. Nothing
# failed, nothing warned, and the file simply drifted.
#
# So this regenerates EVERY realm the registry knows about and fails on any
# difference. It runs on pull requests too, which is the point — main is too
# late to find out.
name: Realms

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: realms-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: '4.7'

jobs:
  regenerate:
    name: Regenerate every realm and diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Only the engine, not the export templates — nothing here exports.
      - name: Cache Godot
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-headless-${{ env.GODOT_VERSION }}-mono

      - name: Install Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          mkdir -p ~/godot
          curl -fsSL -o /tmp/godot.zip "$base/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot

      # GenerateRealm shells out to the literal command `godot-mono`, the name
      # the Scoop package installs on the authoring machine. Give CI the same
      # name rather than teaching the tool two.
      - name: Put godot-mono on PATH
        run: |
          set -euo pipefail
          engine="$HOME/godot/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64"
          test -x "$engine" || { echo "no Godot binary at $engine"; ls -R ~/godot | head -40; exit 1; }
          mkdir -p ~/.local/bin
          ln -sf "$engine" ~/.local/bin/godot-mono
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Read the realms out of the REGISTRY, so adding one to RealmDesigns is
      # all it takes to have it covered here. A hardcoded list would go stale
      # exactly the way the artefacts it is guarding do.
      - name: Find every realm
        id: realms
        run: |
          set -euo pipefail
          realms=$(grep -oE 'new ([A-Za-z0-9]+)Design\(\)' \
                     WoadRaiders.Client/scripts/tools/IRealmDesign.cs \
                   | sed -E 's/new ([A-Za-z0-9]+)Design\(\)/\1/' | sort -u)
          test -n "$realms" || { echo "no realms found in the registry"; exit 1; }
          echo "Realms: $(echo $realms | tr '\n' ' ')"
          echo "list=$(echo $realms | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Regenerate
        run: |
          set -euo pipefail
          for realm in ${{ steps.realms.outputs.list }}; do
            echo "::group::$realm"
            dotnet run tools/GenerateRealm.cs "$realm"
            echo "::endgroup::"
          done

      # Regeneration is byte-deterministic by design (REALM-C-010), so ANY
      # difference means what is committed is not what the design produces.
      - name: Fail if anything drifted
        run: |
          set -euo pipefail
          if git diff --quiet -- WoadRaiders.Client/maps; then
            echo "Every realm regenerates to exactly what is committed."
            exit 0
          fi
          echo "::error::A committed realm does not match what its design produces."
          echo
          echo "Files that drifted:"
          git diff --stat -- WoadRaiders.Client/maps
          echo
          echo "Run this locally and commit the result:"
          for realm in ${{ steps.realms.outputs.list }}; do
            echo "  dotnet run tools/GenerateRealm.cs $realm"
          done
          exit 1

      # The diff is the useful artefact when this fails, and a .tscn diff is
      # unreadable in a log.
      - name: Upload the drift
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: realm-drift
          path: WoadRaiders.Client/maps
          retention-days: 7
