# CI/CD for WoadRaiders releases. Every push to main builds and tests; a
# release is published automatically when the protocol version in
# NetConfig.ConnectionKey ("WoadRaiders.vN") has no tag yet — so bumping the
# key and merging IS the release action. Ordinary commits within a version
# just get CI.
#
# The build/publish engine is tools/release.ps1 — the same script used for
# local releases — so the two paths cannot drift. Actions' GITHUB_TOKEN has
# packages:write here, so the ghcr.io image push works in CI even though
# local pushes need a personal token with that scope.
#
# Manual dispatch offers two extras: publish=false runs the whole build as a
# dry run (artifacts attached to the run, nothing published), and force=true
# re-issues an existing version tag (deletes and recreates the release, so
# the tag moves to the current commit).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases + ghcr (off = dry run; artifacts attached to the run)'
        type: boolean
        default: true
      force:
        description: 'Re-release even if this version tag exists (deletes + recreates the release)'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

# One release pipeline at a time; later runs queue rather than interleave.
concurrency:
  group: release
  cancel-in-progress: false

env:
  GODOT_VERSION: '4.7'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test WoadRaiders.slnx

  # Decide what this run does: build nothing (CI only), build a dry run, or
  # build and publish. The protocol version in NetConfig is the release
  # identity, exactly as in tools/release.ps1.
  gate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      build: ${{ steps.decide.outputs.build }}
      publish: ${{ steps.decide.outputs.publish }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        run: |
          set -euo pipefail
          version=$(grep -oP 'ConnectionKey = "WoadRaiders\.v\K[0-9]+' WoadRaiders.Shared/NetConfig.cs)
          tag="v$version"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi
          build=false
          publish=false
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # A push only releases a brand-new protocol version.
            if [ "$exists" = "false" ]; then build=true; publish=true; fi
          else
            build=true
            if [ "${{ inputs.publish }}" = "true" ]; then
              if [ "$exists" = "false" ] || [ "${{ inputs.force }}" = "true" ]; then publish=true; fi
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "$tag: exists=$exists -> build=$build publish=$publish"

  release:
    needs: [test, gate]
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache Godot and export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-mono

      - name: Install Godot and export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          mkdir -p ~/godot ~/.local/share/godot/export_templates
          curl -fsSL -o /tmp/godot.zip "$base/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          curl -fsSL -o /tmp/templates.tpz "$base/Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz"
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates
          mv /tmp/godot-templates/templates ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono

      - name: Delete the release being re-issued
        if: needs.gate.outputs.publish == 'true' && inputs.force == true
        run: gh release delete "${{ needs.gate.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true

      - name: Build (and publish) the release
        shell: pwsh
        run: |
          $godot = "$HOME/godot/Godot_v$($env:GODOT_VERSION)-stable_mono_linux_x86_64/Godot_v$($env:GODOT_VERSION)-stable_mono_linux.x86_64"
          $params = @{ GodotBin = $godot }
          if ('${{ needs.gate.outputs.publish }}' -eq 'true') { $params.Publish = $true }
          ./tools/release.ps1 @params

      - name: Attach dry-run artifacts to the workflow run
        if: needs.gate.outputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.gate.outputs.tag }}-dry-run
          retention-days: 7
          path: |
            build/WoadRaiders.exe
            build/WoadRaiders-macOS.zip
            build/WoadRaiders-Server-win-x64.zip
            build/WoadRaiders-Server-linux-x64.zip
            build/WoadRaiders-Server-image.tar.gz
            build/latest.json

  # Roll the public dev server (Azure Container Instances, udp/9050) onto the
  # image just published. OIDC federated login — no Azure secret is stored;
  # the three AZURE_* values are identifiers, and the Entra app trusts this
  # repo's main branch. ACI, not Container Apps: the game is UDP (LiteNetLib)
  # and Container Apps ingress has no UDP support.
  deploy:
    needs: [gate, release]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Azure Container Instances
        shell: pwsh
        run: ./tools/deploy-aci.ps1 -Tag '${{ needs.gate.outputs.tag }}'
